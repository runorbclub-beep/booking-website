<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Booking Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 24px;
      color: #333;
    }

    .logout-btn {
      padding: 8px 16px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .card-title {
      font-size: 20px;
      font-weight: bold;
      color: #333;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .org-info {
      display: grid;
      gap: 15px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
    }

    .info-label {
      color: #666;
      font-size: 14px;
    }

    .info-value {
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    .qr-section {
      text-align: center;
      padding: 20px;
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }

    #qrcode canvas {
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .qr-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-wechat {
      background: #07c160;
      color: white;
    }

    .btn-wechat:hover {
      background: #06ad56;
    }

    .btn-download {
      background: #667eea;
      color: white;
    }

    .btn-download:hover {
      background: #5568d3;
    }

    .booking-link {
      background: #f9fafb;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .link-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .link-value {
      font-size: 16px;
      color: #333;
      font-weight: 600;
      word-break: break-all;
    }

    .lang-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <button class="lang-toggle" onclick="toggleLang()">中文</button>

  <div class="container">
    <div class="header">
      <h1 id="dashboardTitle">Admin Dashboard</h1>
      <button class="logout-btn" onclick="logout()" id="logoutBtn">Logout</button>
    </div>

    <div class="card">
      <div class="card-title">
        <span>🏢</span>
        <span id="orgInfoTitle">Organization Information</span>
      </div>
      <div class="org-info" id="orgInfo">
        <div class="loading" id="loading">Loading...</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>📱</span>
        <span id="qrTitle">Share QR Code</span>
      </div>
      <div class="qr-section">
        <p style="color: #666; margin-bottom: 15px;" id="qrDesc">Scan QR code to book appointments</p>
        <div id="qrcode"></div>

        <div class="booking-link">
          <div class="link-label" id="linkLabel">Booking Link:</div>
          <div class="link-value" id="bookingLink"></div>
        </div>

        <div class="qr-buttons">
          <button class="btn btn-wechat" onclick="shareToWeChat()">
            <span>💬</span>
            <span id="wechatBtn">Share to WeChat</span>
          </button>
          <button class="btn btn-download" onclick="downloadQR()">
            <span>💾</span>
            <span id="downloadBtn">Download QR</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://booking-api.billyli198841.workers.dev';
    let lang = 'en';
    let tenantInfo = null;

    const translations = {
      zh: {
        dashboardTitle: '管理后台',
        logoutBtn: '退出登录',
        orgInfoTitle: '机构信息',
        qrTitle: '分享二维码',
        qrDesc: '扫描二维码即可预约',
        linkLabel: '预约链接：',
        wechatBtn: '分享到微信',
        downloadBtn: '下载二维码',
        typeLabel: '类型',
        coach: '专家/教练',
        venue: '场地',
        phoneLabel: '联系电话',
        loading: '加载中...',
        errorLoad: '加载失败',
        shareSuccess: '已复制链接，请打开微信粘贴分享',
        downloadSuccess: '二维码已下载'
      },
      en: {
        dashboardTitle: 'Admin Dashboard',
        logoutBtn: 'Logout',
        orgInfoTitle: 'Organization Information',
        qrTitle: 'Share QR Code',
        qrDesc: 'Scan QR code to book appointments',
        linkLabel: 'Booking Link:',
        wechatBtn: 'Share to WeChat',
        downloadBtn: 'Download QR',
        typeLabel: 'Type',
        coach: 'Expert/Coach',
        venue: 'Venue',
        phoneLabel: 'Contact Phone',
        loading: 'Loading...',
        errorLoad: 'Failed to load',
        shareSuccess: 'Link copied! Open WeChat to paste and share',
        downloadSuccess: 'QR code downloaded'
      }
    };

    function toggleLang() {
      lang = lang === 'zh' ? 'en' : 'zh';
      updateText();
    }

    function updateText() {
      const t = translations[lang];
      document.getElementById('dashboardTitle').textContent = t.dashboardTitle;
      document.getElementById('logoutBtn').textContent = t.logoutBtn;
      document.getElementById('orgInfoTitle').textContent = t.orgInfoTitle;
      document.getElementById('qrTitle').textContent = t.qrTitle;
      document.getElementById('qrDesc').textContent = t.qrDesc;
      document.getElementById('linkLabel').textContent = t.linkLabel;
      document.getElementById('wechatBtn').textContent = t.wechatBtn;
      document.getElementById('downloadBtn').textContent = t.downloadBtn;
      document.querySelector('.lang-toggle').textContent = lang === 'zh' ? 'EN' : '中文';
    }

    function checkLogin() {
      const adminInfo = sessionStorage.getItem('adminInfo');
      if (!adminInfo) {
        window.location.href = 'admin.html';
        return false;
      }
      return JSON.parse(adminInfo);
    }

    function logout() {
      sessionStorage.removeItem('adminInfo');
      window.location.href = 'admin.html';
    }

    async function loadTenantInfo() {
      const adminInfo = checkLogin();
      if (!adminInfo) return;

      const tenantId = adminInfo.tenantId;

      try {
        const response = await fetch(`${API_BASE}/api/tenants?id=${tenantId}`);
        const result = await response.json();

        if (result.success && result.tenant) {
          tenantInfo = result.tenant;
          displayOrgInfo(result.tenant);
          generateQR(result.tenant);
        } else {
          document.getElementById('orgInfo').innerHTML =
            '<div style="text-align: center; color: #ef4444;">Failed to load organization info</div>';
        }
      } catch (error) {
        document.getElementById('orgInfo').innerHTML =
          '<div style="text-align: center; color: #ef4444;">Network error</div>';
      }
    }

    function displayOrgInfo(tenant) {
      const t = translations[lang];
      const typeLabel = tenant.type === 'coach' ? t.coach : t.venue;

      document.getElementById('orgInfo').innerHTML = `
        <div class="info-row">
          <span class="info-label">${t.typeLabel}</span>
          <span class="info-value">${typeLabel}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Name</span>
          <span class="info-value">${tenant.name}</span>
        </div>
        <div class="info-row">
          <span class="info-label">${t.phoneLabel}</span>
          <span class="info-value">${tenant.phone || 'N/A'}</span>
        </div>
      `;
    }

    function generateQR(tenant) {
      const bookingUrl = `https://book.sbody.work/user.html?tenant=${tenant.id}`;
      document.getElementById('bookingLink').textContent = bookingUrl;

      // Clear previous QR code
      const qrContainer = document.getElementById('qrcode');
      qrContainer.innerHTML = '';

      // Generate new QR code
      QRCode.toCanvas(bookingUrl, { width: 256, margin: 2 }, function(error, canvas) {
        if (error) {
          console.error(error);
          qrContainer.innerHTML = '<div style="color: #ef4444;">Failed to generate QR code</div>';
          return;
        }
        qrContainer.appendChild(canvas);
      });
    }

    function shareToWeChat() {
      const bookingUrl = `https://book.sbody.work/user.html?tenant=${tenantInfo.id}`;

      // Copy to clipboard
      if (navigator.clipboard) {
        navigator.clipboard.writeText(bookingUrl).then(() => {
          alert(translations[lang].shareSuccess);
        }).catch(() => {
          fallbackCopy(bookingUrl);
        });
      } else {
        fallbackCopy(bookingUrl);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        alert(translations[lang].shareSuccess);
      } catch (err) {
        alert('Failed to copy. Please copy manually: ' + text);
      }
      document.body.removeChild(textarea);
    }

    function downloadQR() {
      const qrContainer = document.getElementById('qrcode');
      const canvas = qrContainer.querySelector('canvas');

      if (!canvas) {
        alert('QR code not ready');
        return;
      }

      try {
        // Convert canvas to blob
        canvas.toBlob(function(blob) {
          if (!blob) {
            // Fallback: try data URL method
            downloadQRDataUrl(canvas);
            return;
          }

          // Create download link
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = `booking-qr-${tenantInfo.id}-${Date.now()}.png`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);

          alert(translations[lang].downloadSuccess);
        }, 'image/png');
      } catch (error) {
        console.error('Download error:', error);
        // Fallback to data URL method
        downloadQRDataUrl(canvas);
      }
    }

    function downloadQRDataUrl(canvas) {
      try {
        const dataUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = dataUrl;
        link.download = `booking-qr-${tenantInfo.id}-${Date.now()}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        alert(translations[lang].downloadSuccess);
      } catch (error) {
        console.error('Data URL download error:', error);
        alert('Download failed. Please try taking a screenshot instead.');
      }
    }

    // Initialize
    updateText();
    loadTenantInfo();
  </script>
</body>
</html>
