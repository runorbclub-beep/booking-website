<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin - Booking Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      color: #666;
    }

    .logout-btn {
      padding: 8px 16px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .logout-btn:hover {
      background: #dc2626;
    }

    .section {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .section h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #333;
    }

    .org-card {
      border: 1px solid #e1e8ed;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
    }

    .org-card:last-child {
      margin-bottom: 0;
    }

    .org-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 15px;
    }

    .org-name {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }

    .org-type {
      display: inline-block;
      padding: 4px 8px;
      background: #e0e7ff;
      color: #4338ca;
      border-radius: 4px;
      font-size: 12px;
    }

    .org-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 15px;
    }

    .detail-item {
      font-size: 14px;
    }

    .detail-label {
      color: #666;
      margin-right: 5px;
    }

    .detail-value {
      color: #333;
      font-weight: 500;
    }

    .resources-list {
      margin: 15px 0;
    }

    .resources-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .resource-item {
      display: inline-block;
      padding: 4px 10px;
      background: #f3f4f6;
      border-radius: 4px;
      font-size: 13px;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-success {
      background: #10b981;
      color: white;
    }

    .btn-success:hover {
      background: #059669;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .lang-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <button class="lang-toggle" onclick="toggleLang()">中文</button>

  <div class="container">
    <div class="header">
      <div>
        <h1 id="pageTitle">🔐 Super Admin</h1>
        <p id="pageDesc">Approve organization registrations</p>
      </div>
      <button class="logout-btn" onclick="logout()" id="logoutBtn">Logout</button>
    </div>

    <div class="section">
      <h2 id="pendingTitle">Organizations Pending Approval</h2>
      <div id="pendingOrgs"></div>
    </div>

    <div class="section">
      <h2 id="approvedTitle">Approved Organizations</h2>
      <div id="approvedOrgs"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://booking-api.billyli198841.workers.dev';
    let lang = 'en';
    let superAdminInfo = null;

    const translations = {
      zh: {
        pageTitle: '🔐 超级管理员',
        pageDesc: '审批机构注册',
        logoutBtn: '退出登录',
        pendingTitle: '待审批机构',
        approvedTitle: '已审批机构',
        orgType: '类型',
        phone: '联系电话',
        resources: '资源清单',
        approve: '批准',
        reject: '拒绝',
        confirmApprove: '确认批准该机构？',
        confirmReject: '确认拒绝该机构？',
        approved: '已批准',
        rejected: '已拒绝',
        coach: '专家/教练',
        venue: '场地',
        emptyPending: '暂无待审批机构',
        emptyApproved: '暂无已审批机构',
        loading: '加载中...',
        errorLoad: '加载失败，请刷新重试',
        successApprove: '已批准',
        successReject: '已拒绝'
      },
      en: {
        pageTitle: '🔐 Super Admin',
        pageDesc: 'Approve organization registrations',
        logoutBtn: 'Logout',
        pendingTitle: 'Organizations Pending Approval',
        approvedTitle: 'Approved Organizations',
        orgType: 'Type',
        phone: 'Contact Phone',
        resources: 'Resources',
        approve: 'Approve',
        reject: 'Reject',
        confirmApprove: 'Confirm to approve this organization?',
        confirmReject: 'Confirm to reject this organization?',
        approved: 'Approved',
        rejected: 'Rejected',
        coach: 'Expert/Coach',
        venue: 'Venue',
        emptyPending: 'No organizations pending approval',
        emptyApproved: 'No approved organizations yet',
        loading: 'Loading...',
        errorLoad: 'Failed to load, please refresh',
        successApprove: 'Approved',
        successReject: 'Rejected'
      }
    };

    function toggleLang() {
      lang = lang === 'zh' ? 'en' : 'zh';
      updateText();
      loadData();
    }

    function updateText() {
      const t = translations[lang];
      document.getElementById('pageTitle').textContent = t.pageTitle;
      document.getElementById('pageDesc').textContent = t.pageDesc;
      document.getElementById('logoutBtn').textContent = t.logoutBtn;
      document.getElementById('pendingTitle').textContent = t.pendingTitle;
      document.getElementById('approvedTitle').textContent = t.approvedTitle;
      document.querySelector('.lang-toggle').textContent = lang === 'zh' ? 'EN' : '中文';
    }

    function checkLogin() {
      superAdminInfo = sessionStorage.getItem('superAdminInfo');
      if (!superAdminInfo) {
        window.location.href = 'admin.html';
        return false;
      }
      superAdminInfo = JSON.parse(superAdminInfo);
      return true;
    }

    function logout() {
      sessionStorage.removeItem('superAdminInfo');
      window.location.href = 'admin.html';
    }

    async function loadData() {
      const t = translations[lang];

      try {
        const response = await fetch(`${API_BASE}/api/tenants?status=pending`);
        const result = await response.json();

        const pendingEl = document.getElementById('pendingOrgs');
        if (result.success && result.tenants && result.tenants.length > 0) {
          pendingEl.innerHTML = result.tenants.map(org => createOrgCard(org, 'pending')).join('');
        } else {
          pendingEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📭</div>
              <div>${t.emptyPending}</div>
            </div>
          `;
        }

        const approvedResponse = await fetch(`${API_BASE}/api/tenants?status=active`);
        const approvedResult = await approvedResponse.json();

        const approvedEl = document.getElementById('approvedOrgs');
        if (approvedResult.success && approvedResult.tenants && approvedResult.tenants.length > 0) {
          approvedEl.innerHTML = approvedResult.tenants.map(org => createOrgCard(org, 'approved')).join('');
        } else {
          approvedEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📭</div>
              <div>${t.emptyApproved}</div>
            </div>
          `;
        }
      } catch (error) {
        document.getElementById('pendingOrgs').innerHTML = `<div class="loading">${t.errorLoad}</div>`;
      }
    }

    function createOrgCard(org, status) {
      const t = translations[lang];
      const typeLabel = org.type === 'coach' ? t.coach : t.venue;
      const resources = org.resources || [];

      return `
        <div class="org-card" id="org-${org.id}">
          <div class="org-header">
            <div>
              <div class="org-name">${org.name}</div>
              <span class="org-type">${typeLabel}</span>
            </div>
            ${status === 'pending' ? `
              <div class="action-buttons">
                <button class="btn btn-success" onclick="approveOrg('${org.id}')">${t.approve}</button>
                <button class="btn btn-danger" onclick="rejectOrg('${org.id}')">${t.reject}</button>
              </div>
            ` : `
              <div style="color: #10b981; font-weight: 600;">${t.approved}</div>
            `}
          </div>

          <div class="org-details">
            <div class="detail-item">
              <span class="detail-label">${t.orgType}:</span>
              <span class="detail-value">${typeLabel}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">${t.phone}:</span>
              <span class="detail-value">${org.phone || 'N/A'}</span>
            </div>
          </div>

          ${resources.length > 0 ? `
            <div class="resources-list">
              <div class="resources-title">${t.resources}:</div>
              ${resources.map(r => `<span class="resource-item">${r}</span>`).join('')}
            </div>
          ` : ''}
        </div>
      `;
    }

    async function approveOrg(orgId) {
      const t = translations[lang];
      if (!confirm(t.confirmApprove)) return;

      try {
        const response = await fetch(`${API_BASE}/api/tenants/${orgId}/approve`, {
          method: 'POST'
        });
        const result = await response.json();

        if (result.success) {
          alert(t.successApprove);
          loadData();
        } else {
          alert('Error: ' + (result.error || 'Failed to approve'));
        }
      } catch (error) {
        alert('Error: Failed to approve');
      }
    }

    async function rejectOrg(orgId) {
      const t = translations[lang];
      if (!confirm(t.confirmReject)) return;

      try {
        const response = await fetch(`${API_BASE}/api/tenants/${orgId}/reject`, {
          method: 'POST'
        });
        const result = await response.json();

        if (result.success) {
          alert(t.successReject);
          loadData();
        } else {
          alert('Error: ' + (result.error || 'Failed to reject'));
        }
      } catch (error) {
        alert('Error: Failed to reject');
      }
    }

    // Initialize
    if (checkLogin()) {
      updateText();
      loadData();
    }
  </script>
</body>
</html>
